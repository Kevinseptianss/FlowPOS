name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"

      - name: Get dependencies
        run: flutter pub get

      - name: Create app_secrets.dart file
        run: |
          mkdir -p lib/core/secrets
          echo "class AppSecrets {" > lib/core/secrets/app_secrets.dart
          echo "  static const supabaseURL = '${{ secrets.SUPABASE_URL }}';" >> lib/core/secrets/app_secrets.dart
          echo "  static const supabaseKey = '${{ secrets.SUPABASE_KEY }}';" >> lib/core/secrets/app_secrets.dart
          echo "}" >> lib/core/secrets/app_secrets.dart

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
